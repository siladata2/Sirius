<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SIRIUS Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        
        .navbar {
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            padding: 16px 32px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.3s;
            padding: 8px 16px;
            border-radius: 12px;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 100px 32px 40px;
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
            margin: 0 auto 20px;
        }
        
        .card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        
        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 12px 20px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .container { padding: 80px 16px 32px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">✨ SIRIUS</div>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/settings">Settings</a>
                <a href="/profile" class="active">Profile</a>
            </div>
            <div class="user-info">
                <span id="userName" class="avatar"></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar">U</div>
            <h2 id="profileName">User</h2>
            <p id="profilePhone">-</p>
        </div>
        
        <div class="card">
            <div class="info-row">
                <span>Username:</span>
                <span id="username">-</span>
            </div>
            <div class="info-row">
                <span>Phone Number:</span>
                <span id="phoneNumber">-</span>
            </div>
            <div class="info-row">
                <span>Paired At:</span>
                <span id="pairedAt">-</span>
            </div>
            <div class="info-row">
                <span>Account Type:</span>
                <span id="accountType">User</span>
            </div>
        </div>
        
        <div class="card">
            <h3>⚠️ Danger Zone</h3>
            <button class="btn-danger" onclick="disconnectBot()">🔌 Disconnect Bot</button>
            <p style="font-size: 12px; color: #64748b; margin-top: 12px;">This will disconnect your WhatsApp bot. You'll need to pair again.</p>
        </div>
    </div>
    
    <script>
        const token = localStorage.getItem('sirius_token');
        if (!token) {
            window.location.href = '/login';
        }
        
        let currentUser = null;
        
        async function loadUser() {
            const response = await fetch('/api/auth/verify', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (data.valid) {
                currentUser = data.user;
                document.getElementById('userName').textContent = currentUser.username.charAt(0).toUpperCase();
                document.getElementById('profileAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
                document.getElementById('profileName').textContent = currentUser.username;
                document.getElementById('profilePhone').textContent = currentUser.phone_number;
                document.getElementById('username').textContent = currentUser.username;
                document.getElementById('phoneNumber').textContent = currentUser.phone_number;
                document.getElementById('pairedAt').textContent = currentUser.paired_at ? new Date(currentUser.paired_at).toLocaleString() : 'Just now';
                document.getElementById('accountType').innerHTML = currentUser.is_admin ? '<span style="color: #6366f1;">Admin</span>' : 'User';
            } else {
                window.location.href = '/login';
            }
        }
        
        async function disconnectBot() {
            if (!confirm('⚠️ Are you sure you want to disconnect your bot? You will need to pair again.')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/bot/disconnect?number=${currentUser.phone_number}`);
                const data = await response.json();
                if (data.status === 'success') {
                    showToast('Bot disconnected! Redirecting...');
                    setTimeout(() => {
                        localStorage.clear();
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showToast('Failed to disconnect');
                }
            } catch (error) {
                showToast('Network error');
            }
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }
        
        loadUser();
    </script>
</body>
</html>
