<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIRIUS Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 24px;
        }
        
        .login-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 32px;
            padding: 40px;
            animation: fadeIn 0.6s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 32px;
        }
        
        .input-group {
            margin-bottom: 24px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
        
        .links {
            text-align: center;
            margin-top: 24px;
        }
        
        .links a {
            color: #6366f1;
            text-decoration: none;
            font-size: 14px;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #ef4444;
            font-size: 14px;
            text-align: center;
        }
        
        .info-message {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid #6366f1;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #94a3b8;
            font-size: 14px;
            text-align: center;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">✨ SIRIUS</div>
            
            <div id="infoMsg" class="info-message" style="display: none;"></div>
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>📱 Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="Enter your WhatsApp number" required>
                </div>
                
                <div class="input-group">
                    <label>🔑 Password</label>
                    <input type="password" id="password" placeholder="Enter your 8-character password" required>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    🔐 Login to Dashboard
                </button>
            </form>
            
            <div class="links">
                <a href="/">Don't have an account? Pair your device first</a>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const infoMsg = document.getElementById('infoMsg');
        const loginBtn = document.getElementById('loginBtn');
        
        // Auto-fill from previous pairing
        const savedNumber = localStorage.getItem('sirius_user_number');
        const savedPassword = localStorage.getItem('sirius_user_password');
        if (savedNumber) {
            document.getElementById('phoneNumber').value = savedNumber;
        }
        if (savedPassword) {
            document.getElementById('password').value = savedPassword;
            showInfo('Your password has been auto-filled from pairing!');
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const password = document.getElementById('password').value;
            
            if (!phoneNumber || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: phoneNumber, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('sirius_token', data.token);
                    localStorage.setItem('sirius_user', JSON.stringify(data.user));
                    window.location.href = '/dashboard';
                } else {
                    showError(data.error || 'Login failed. Make sure you have paired your device first.');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '🔐 Login to Dashboard';
                }
            } catch (error) {
                showError('Network error. Please try again.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '🔐 Login to Dashboard';
            }
        });
        
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            infoMsg.style.display = 'none';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }
        
        function showInfo(message) {
            infoMsg.textContent = message;
            infoMsg.style.display = 'block';
            setTimeout(() => {
                infoMsg.style.display = 'none';
            }, 5000);
        }
        
        // Check if already logged in
        const token = localStorage.getItem('sirius_token');
        if (token) {
            fetch('/api/auth/verify', {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(res => res.json()).then(data => {
                if (data.valid) {
                    window.location.href = '/dashboard';
                }
            }).catch(() => {});
        }
    </script>
</body>
</html>
